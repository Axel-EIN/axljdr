name: Deploy to OVH

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: www/jdr/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            vendor/**
            var/cache/**
            var/logs/**
            bin/**
            tests/**
            .env*
            composer.json
            composer.lock
            symfony.lock
            phpunit.xml.dist
            .gitignore
    
      - name: Clear Symfony cache
        run: curl -f "https://jdr.axl-design.me/clear_cache.php?token=${{ secrets.CACHE_CLEAR_TOKEN }}"
